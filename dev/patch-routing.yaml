---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinic-deploy
spec:
  template:
    spec:
      containers:
      - name: springboot
        env:
        - name: SERVER_SERVLET_CONTEXT_PATH
          value: "/tp7"

        # On écrase et on corrige la sonde de démarrage
        startupProbe:
          $patch: replace
          httpGet:
            path: /tp7/actuator/health/readiness
            port: 8080
          timeoutSeconds: 2
          periodSeconds: 3
          initialDelaySeconds: 2
          failureThreshold: 10

        # On écrase et on corrige la sonde de vie
        livenessProbe:
          $patch: replace
          httpGet:
            path: /tp7/actuator/health/liveness
            port: 8080
          timeoutSeconds: 1
          periodSeconds: 3

        # On écrase et on corrige la sonde de disponibilité
        readinessProbe:
          $patch: replace
          httpGet:
            path: /tp7/actuator/health/readiness
            port: 8080
          timeoutSeconds: 1
          periodSeconds: 3
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clinic-ingress
spec:
  rules:
  - http:
      paths:
      - pathType: Prefix
        path: /tp7
        backend:
          service:
            name: clinic-service
            port:
              number: 8080
